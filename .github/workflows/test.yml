name: Test Suite

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Run unit tests
      run: |
        pytest tests/ -v -m "unit" --cov=src --cov-report=xml

    - name: Run integration tests
      run: |
        pytest tests/ -v -m "integration" --cov=src --cov-report=xml --cov-append

    - name: Run UI tests
      run: |
        pytest tests/ -v -m "ui" --cov=src --cov-report=xml --cov-append

    - name: Run performance tests
      run: |
        pytest tests/ -v -m "performance" --cov=src --cov-report=xml --cov-append

    - name: Run SRAL tests
      run: |
        pytest tests/ -v -m "requires_sral" --cov=src --cov-report=xml --cov-append

    - name: Generate coverage report
      run: |
        coverage report
        coverage html

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-reports/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true