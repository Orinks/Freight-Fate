name: CI

permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      FREIGHT_FATE_NO_SPEECH: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src tests tools

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src/freight_fate --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml

  changelog:
    # The changelog gate only runs locally as a pre-commit hook, which outside
    # contributors don't have installed; this enforces it on every PR.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require a changelog entry for user-facing changes
        run: >
          python3 tools/release_notes.py check
          --base "origin/${{ github.base_ref }}"
          --head HEAD

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  recover-nightly:
    name: Recover failed nightly
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [test, changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Retry today's failed snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="nightly-$(date -u +%Y%m%d)"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "$TAG already exists; no recovery build needed."
            exit 0
          fi

          ACTIVE=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow Build --branch dev --limit 20 \
            --json status --jq '[.[] | select(.status == "queued" or .status == "in_progress")] | length')
          if [ "$ACTIVE" -gt 0 ]; then
            echo "A dev Build is already queued or running; no duplicate recovery needed."
            exit 0
          fi

          CONCLUSION=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow Build --event schedule --limit 1 \
            --json conclusion --jq '.[0].conclusion // ""')

          if [ "$CONCLUSION" != "failure" ]; then
            echo "Latest scheduled Build conclusion is '$CONCLUSION'; not retrying."
            exit 0
          fi

          echo "Today's scheduled snapshot failed and $TAG is missing; dispatching recovery."
          gh workflow run Build --repo "$GITHUB_REPOSITORY" --ref dev -f dry_run=false
