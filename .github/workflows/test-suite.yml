name: Test Suite

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pygame python3-wxgtk4.0 libasound2-dev portaudio19-dev

    - name: Create Mock SRAL Environment
      run: |
        # Create mock SRAL.dll environment for CI testing
        mkdir -p src/mock_sral
        echo "Mock SRAL environment created for CI testing"
      
    - name: Set CI Testing Environment
      run: |
        echo "PYTEST_ADDOPTS=--ci-mode" >> $GITHUB_ENV
        echo "SRAL_MOCK_ENABLED=1" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/ -v -m "unit and not requires_sral" --cov=src --cov-report=xml

    - name: Run integration tests
      run: |
        pytest tests/ -v -m "integration and not requires_sral" --cov=src --cov-report=xml --cov-append

    - name: Run UI tests
      run: |
        xvfb-run pytest tests/ -v -m "ui and not requires_sral" --cov=src --cov-report=xml --cov-append

    - name: Run performance tests
      run: |
        xvfb-run pytest tests/ -v -m "performance and not requires_sral" --cov=src --cov-report=xml --cov-append

    - name: Run SRAL mock tests
      run: |
        pytest tests/ -v -m "requires_sral" --cov=src --cov-report=xml --cov-append

    - name: Generate coverage report
      run: |
        coverage report
        coverage html

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-reports/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black mypy

    - name: Run flake8
      run: flake8 src/ tests/

    - name: Run pylint
      run: pylint src/ tests/

    - name: Run black
      run: black --check src/ tests/

    - name: Run mypy
      run: mypy src/ tests/

  windows-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run SRAL-specific tests on Windows
      run: |
        pytest tests/ -v -m "requires_sral" --cov=src --cov-report=xml
      continue-on-error: true  # Allow these tests to fail on CI

    - name: Upload Windows test results
      uses: actions/upload-artifact@v3
      with:
        name: windows-test-results
        path: test-reports/