repos:
  - repo: local
    hooks:
      - id: ruff-check-fix
        name: Ruff lint and import fixes
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: freight-fate-release-notes
        name: Freight Fate release-note gate
        entry: uv run python -m tools.release_notes check --base auto --head HEAD
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
